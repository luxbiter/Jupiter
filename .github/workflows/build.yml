name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\src\Jupiter\Jupiter.csproj

      - name: Build
        run: dotnet build .\src\Jupiter\Jupiter.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish .\src\Jupiter\Jupiter.csproj -c Release -r win-x64 --self-contained true -o .\dist\Jupiter

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jupiter-win-x64
          path: dist/Jupiter/Jupiter.exe
